name: Build APK

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-27 build-tools;27.0.3'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p out
          cp clavierexterne/build/outputs/apk/debug/clavierexterne-debug.apk out/clavierexterne-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clavierexterne-debug
          path: out/clavierexterne-debug.apk

      - name: Create/update release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/clavierexterne-debug.apk
          generate_release_notes: true
